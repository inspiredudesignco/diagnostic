<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InspirEDU Learning Ecosystem Diagnostic™</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, 'Times New Roman', serif; background: #fff; color: #1a1a1a; }

  .header { background: #fff; padding: 1.5rem 2rem 1rem; text-align: center; border-bottom: 2px solid #e0d0c1; }
  .header img { max-height: 90px; width: auto; }
  .hero-title { font-size: 20px; font-weight: 700; color: #00463d; letter-spacing: 0.04em; margin-top: 10px; }
  .hero-sub { font-size: 13px; color: #888; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin-top: 4px; }

  .diag-wrap { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem 3rem; }

  .progress-bar { height: 5px; background: #e0d0c1; border-radius: 3px; margin-bottom: 2rem; }
  .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #216d57, #c9a84c); transition: width 0.4s; }

  .domain-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: #216d57; text-transform: uppercase; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin-bottom: 6px; }
  .q-title { font-size: 18px; font-weight: 400; color: #00463d; margin-bottom: 1.75rem; line-height: 1.5; font-style: italic; }

  .likert-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .likert-btn { flex: 1; padding: 12px 4px; border: 1.5px solid #e0d0c1; border-radius: 6px; background: #fff; cursor: pointer; font-size: 15px; font-weight: 600; color: #216d57; text-align: center; transition: all 0.15s; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .likert-btn:hover { background: #f5efe8; border-color: #c9a84c; }
  .likert-btn.selected { background: #216d57; border-color: #216d57; color: #e0d0c1; }

  .likert-labels { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 1.75rem; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .nav-row { display: flex; gap: 10px; margin-top: 0.5rem; }
  .nav-btn { padding: 10px 22px; border-radius: 6px; border: 1.5px solid #e0d0c1; background: #fff; color: #216d57; cursor: pointer; font-size: 14px; font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; letter-spacing: 0.03em; }
  .nav-btn.primary { background: #216d57; border-color: #216d57; color: #e0d0c1; }
  .nav-btn:hover { opacity: 0.88; }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .step-indicator { font-size: 12px; color: #aaa; margin-bottom: 0.5rem; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .divider { border: none; border-top: 1px solid #e0d0c1; margin: 1.5rem 0; }

  .score-card { background: #00463d; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; display: flex; align-items: flex-start; gap: 24px; flex-wrap: wrap; }
  .score-num { font-size: 52px; font-weight: 700; color: #c9a84c; line-height: 1; font-family: Georgia, serif; }
  .score-denom { font-size: 22px; color: #a8c5bc; }
  .maturity-badge { display: inline-block; padding: 5px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-top: 10px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; letter-spacing: 0.04em; }
  .interp-text { font-size: 13px; color: #e0d0c1; line-height: 1.7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .interp-label { font-size: 11px; color: #a8c5bc; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .section-title { font-size: 13px; font-weight: 700; color: #216d57; margin: 1.75rem 0 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding-bottom: 8px; border-bottom: 2px solid #e0d0c1; }

  .domain-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .domain-name { font-size: 13px; font-weight: 500; color: #00463d; width: 175px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 9px; background: #e0d0c1; border-radius: 5px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #216d57, #c9a84c); }
  .bar-score { font-size: 13px; font-weight: 700; width: 32px; text-align: right; color: #00463d; }

  .insight-card { border-left: 4px solid #c9a84c; padding: 12px 16px; margin-bottom: 12px; background: #f9f6f0; border-radius: 0 8px 8px 0; }
  .insight-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #c9a84c; margin-bottom: 5px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .insight-text { font-size: 13px; color: #444; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .rec-card { background: #fff; border: 1.5px solid #e0d0c1; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; border-left: 5px solid #216d57; }
  .rec-title { font-size: 14px; font-weight: 700; color: #00463d; margin-bottom: 4px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .rec-text { font-size: 13px; color: #555; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .cta-box { background: #00463d; border-radius: 12px; padding: 2rem 1.75rem; text-align: center; margin-top: 2rem; }
  .cta-heading { color: #e0d0c1; font-size: 20px; font-weight: 700; margin-bottom: 10px; font-family: Georgia, serif; }
  .cta-sub { color: #a8c5bc; font-size: 13px; line-height: 1.7; margin-bottom: 1.5rem; max-width: 440px; margin-left: auto; margin-right: auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .cta-btn { display: inline-block; background: #c9a84c; color: #00463d; border: none; border-radius: 6px; padding: 13px 32px; font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; letter-spacing: 0.04em; }
  .cta-note { color: #a8c5bc; font-size: 12px; margin-top: 14px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .field-wrap { margin-bottom: 14px; }
  .field-label { display: block; font-size: 12px; font-weight: 600; color: #216d57; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .field-required { color: #c9a84c; margin-left: 2px; }
  .field-input { display: block; width: 100%; padding: 10px 14px; border-radius: 6px; border: 1.5px solid #e0d0c1; font-size: 14px; color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; }
  .field-input:focus { outline: none; border-color: #216d57; }
  .field-input.error { border-color: #c0392b; }
  .error-msg { font-size: 12px; color: #c0392b; margin-top: 4px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: none; }
  .error-msg.visible { display: block; }

  .intro-title { font-size: 22px; font-weight: 700; color: #00463d; margin-bottom: 10px; line-height: 1.3; }
  .intro-text { font-size: 14px; color: #444; line-height: 1.75; margin-bottom: 1.5rem; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .intro-meta { font-size: 12px; color: #888; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin-bottom: 1.5rem; letter-spacing: 0.04em; text-transform: uppercase; }

  .restart-btn { display: block; margin: 1.5rem auto 0; background: none; border: 1.5px solid #e0d0c1; border-radius: 6px; padding: 9px 22px; font-size: 13px; cursor: pointer; color: #888; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .footer { background: #00463d; padding: 1rem 2rem; text-align: center; margin-top: 3rem; }
  .footer-text { font-size: 11px; color: #a8c5bc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; letter-spacing: 0.06em; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init('2ryoSbx4z-lJMzq2E');
const EMAILJS_SERVICE  = 'service_78dpnxm';
const EMAILJS_TEMPLATE = 'template_9dk319v';
const domains = [
  { name: "Strategic Alignment", questions: [
    "Learning initiatives are clearly connected to organizational goals and business priorities.",
    "Senior leadership actively champions learning as a strategic investment.",
    "Learning programs have defined success metrics that are tracked and reviewed."
  ]},
  { name: "Audience & Experience", questions: [
    "Learner needs, roles, and skill gaps are clearly identified before designing programs.",
    "Learning experiences are intentionally designed with clear objectives and structure.",
    "Content and delivery are tailored to the specific context of different learner groups."
  ]},
  { name: "Knowledge & Content Flow", questions: [
    "Organizational knowledge is documented, findable, and maintained over time.",
    "Learning content is centralized or organized so people know where to find it.",
    "Critical information is not locked in individual contributors or informal channels."
  ]},
  { name: "Workflow Integration", questions: [
    "Learning is embedded into daily work rather than treated as a separate event.",
    "People can access support and knowledge at the moment they need it.",
    "Learning resources directly support real-time decisions and task execution."
  ]},
  { name: "Systems & Optimization", questions: [
    "Learning tools and platforms are intentionally chosen and integrated with each other.",
    "Reinforcement and spaced learning mechanisms exist to extend retention.",
    "Learner feedback and performance data are used to improve programs continuously."
  ]}
];

const serviceMap = {
  "Strategic Alignment": { service: "Learning Strategy & Consulting", desc: "Align learning investment with business outcomes through strategic planning and executive advisory." },
  "Audience & Experience": { service: "Instructional Design & Curriculum", desc: "Design learner-centered experiences grounded in adult learning principles and performance goals." },
  "Knowledge & Content Flow": { service: "Knowledge Structuring & eLearning", desc: "Organize, document, and scale organizational knowledge into accessible, structured content." },
  "Workflow Integration": { service: "Embedded Learning Design", desc: "Integrate learning touchpoints directly into workflows, tools, and job aids at point of need." },
  "Systems & Optimization": { service: "Learning Systems & Optimization", desc: "Audit, consolidate, and optimize your learning tech stack and measurement approach." }
};

const maturityLevels = [
  { min: 1.0, max: 1.9, label: "Fragmented", color: "#7a1f1f", bg: "#fde8e8", border: "#e8a0a0" },
  { min: 2.0, max: 2.9, label: "Emerging", color: "#7a4f00", bg: "#fef3d8", border: "#e8c870" },
  { min: 3.0, max: 3.9, label: "Structured", color: "#1a5c3a", bg: "#e4f2ea", border: "#7dc49a" },
  { min: 4.0, max: 5.0, label: "Integrated Ecosystem", color: "#00463d", bg: "#d6ede7", border: "#5aaa8a" }
];

let state = { phase: "intro", qIndex: 0, answers: {}, userInfo: { name: "", org: "", email: "" }, leadSent: false };
const totalQs = domains.reduce((a, d) => a + d.questions.length, 0);

function getQGlobal(idx) {
  let count = 0;
  for (let di = 0; di < domains.length; di++) {
    for (let qi = 0; qi < domains[di].questions.length; qi++) {
      if (count === idx) return { domain: di, question: qi };
      count++;
    }
  }
}

function getMaturity(score) {
  return maturityLevels.find(m => score >= m.min && score <= m.max) || maturityLevels[maturityLevels.length - 1];
}

function calcScores() {
  const domainScores = domains.map((d, di) => {
    let total = 0, count = 0, qGlobal = 0;
    for (let x = 0; x < di; x++) qGlobal += domains[x].questions.length;
    d.questions.forEach((_, qi) => {
      const key = qGlobal + qi;
      if (state.answers[key]) { total += state.answers[key]; count++; }
    });
    return count ? total / count : 0;
  });
  const overall = domainScores.reduce((a, b) => a + b, 0) / domainScores.length;
  return { domainScores, overall };
}

function domainInsight(name, score) {
  const insights = {
    "Strategic Alignment": score < 3 ? "Learning may lack executive sponsorship and organizational direction. Without strategic framing, programs often fail to gain traction or budget." : "Strategic foundations are present. Focus on tightening measurement and connecting outcomes to business KPIs.",
    "Audience & Experience": score < 3 ? "Learner needs may not be well understood, resulting in generic or misaligned content. Design should start with audience analysis." : "Experience design is developing. Deepen personalization and evidence-based instructional approaches.",
    "Knowledge & Content Flow": score < 3 ? "Knowledge likely lives in silos — in individuals, inboxes, or disconnected systems. Significant institutional risk and onboarding friction exist." : "Content organization is improving. Prioritize governance and maintenance processes.",
    "Workflow Integration": score < 3 ? "Learning happens away from work, reducing transfer and application. Embedding learning into workflows dramatically increases impact." : "Integration is underway. Explore performance support tools and contextual job aids.",
    "Systems & Optimization": score < 3 ? "Tools may be underutilized or misaligned with learning goals. A systems audit can surface quick wins and reduce redundancy." : "Systems are in place. Focus on data instrumentation and closing the feedback loop."
  };
  return insights[name] || "";
}

function renderIntro() {
  return `
    <div class="intro-title">Is your organization's learning ecosystem working for you?</div>
    <div class="intro-text">Most organizations have learning happening — in onboarding, in meetings, in everyday decisions. But without intentional design, it stays invisible, inconsistent, and unscalable.<br><br>This diagnostic assesses your learning ecosystem across five critical domains and identifies exactly where the gaps are — and what to do about them.</div>
    <div class="intro-meta">15 questions · ~5 minutes · Your results are confidential</div>
    <hr class="divider" />

    <div class="field-wrap">
      <label class="field-label" for="inp-name">Your Name <span class="field-required">*</span></label>
      <input class="field-input" id="inp-name" type="text" placeholder="First and last name" value="${state.userInfo.name}" />
      <div class="error-msg" id="err-name">Please enter your name.</div>
    </div>
    <div class="field-wrap">
      <label class="field-label" for="inp-org">Organization <span class="field-required">*</span></label>
      <input class="field-input" id="inp-org" type="text" placeholder="Company or organization name" value="${state.userInfo.org}" />
      <div class="error-msg" id="err-org">Please enter your organization's name.</div>
    </div>
    <div class="field-wrap">
      <label class="field-label" for="inp-email">Work Email <span class="field-required">*</span></label>
      <input class="field-input" id="inp-email" type="email" placeholder="you@organization.com" value="${state.userInfo.email}" />
      <div class="error-msg" id="err-email">Please enter a valid email address.</div>
    </div>

    <button class="nav-btn primary" onclick="startDiag()" style="margin-top:8px;">Begin Assessment</button>
  `;
}

function renderQuestion() {
  const info = getQGlobal(state.qIndex);
  const domain = domains[info.domain];
  const qText = domain.questions[info.question];
  const progress = (state.qIndex / totalQs) * 100;
  const current = state.answers[state.qIndex];
  return `
    <div class="step-indicator">Question ${state.qIndex + 1} of ${totalQs}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="domain-label">${domain.name}</div>
    <div class="q-title">${qText}</div>
    <div class="likert-row">
      ${[1,2,3,4,5].map(v => `<button class="likert-btn${current===v?' selected':''}" onclick="selectAnswer(${v})">${v}</button>`).join('')}
    </div>
    <div class="likert-labels"><span>Non-existent</span><span>Ad hoc</span><span>Developing</span><span>Structured</span><span>Optimized</span></div>
    <div class="nav-row">
      ${state.qIndex > 0 ? `<button class="nav-btn" onclick="goBack()">Back</button>` : ''}
      <button class="nav-btn primary" onclick="goNext()" ${!current ? 'disabled' : ''}>
        ${state.qIndex === totalQs - 1 ? 'View My Results' : 'Next'}
      </button>
    </div>
  `;
}

function renderReport() {
  const { domainScores, overall } = calcScores();
  const maturity = getMaturity(overall);
  const sorted = domains.map((d,i) => ({ name: d.name, score: domainScores[i] })).sort((a,b) => a.score - b.score);
  const weakDomains = sorted.slice(0, 3).filter(d => d.score < 4);
  sendResultsEmail(domainScores, overall, weakDomains);
  const overallInterp = overall < 2
    ? "Your learning ecosystem has significant structural gaps across strategy, design, and delivery. These gaps carry real organizational cost — in productivity, retention, and decision quality. A targeted intervention is recommended."
    : overall < 3
    ? "Learning activity exists but lacks the consistency, direction, and integration needed to drive performance. Focused improvements in key domains can create meaningful, measurable change."
    : overall < 4
    ? "Your ecosystem has solid foundations. Opportunities remain to deepen integration, personalize experiences, and strengthen measurement."
    : "Your learning ecosystem is mature and well-integrated. Continued focus on optimization and innovation will sustain your competitive advantage.";

  return `
    <div style="font-size:11px;font-weight:700;letter-spacing:0.1em;color:#216d57;text-transform:uppercase;margin-bottom:16px;font-family:sans-serif;">Diagnostic Report · ${state.userInfo.name}${state.userInfo.org ? ' · ' + state.userInfo.org : ''}</div>

    <div class="score-card">
      <div>
        <div style="font-size:11px;color:#a8c5bc;letter-spacing:0.08em;text-transform:uppercase;font-family:sans-serif;margin-bottom:4px;">Overall Score</div>
        <div class="score-num">${overall.toFixed(1)}<span class="score-denom">/5</span></div>
        <span class="maturity-badge" style="background:${maturity.bg};color:${maturity.color};border:1.5px solid ${maturity.border}">${maturity.label}</span>
      </div>
      <div style="flex:1;min-width:180px;">
        <div class="interp-label">Interpretation</div>
        <div class="interp-text">${overallInterp}</div>
      </div>
    </div>

    <div class="section-title">Domain Breakdown</div>
    ${domains.map((d,i) => {
      const s = domainScores[i];
      const pct = ((s - 1) / 4) * 100;
      return `<div class="domain-row">
        <div class="domain-name">${d.name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-score">${s.toFixed(1)}</div>
      </div>`;
    }).join('')}

    ${weakDomains.length ? `
    <div class="section-title">Priority Gaps</div>
    ${weakDomains.map(d => `
      <div class="insight-card">
        <div class="insight-label">${d.name} · ${d.score.toFixed(1)}</div>
        <div class="insight-text">${domainInsight(d.name, d.score)}</div>
      </div>`).join('')}` : ''}

    <div class="section-title">Where InspirEDU Can Help</div>
    ${weakDomains.map(d => {
      const rec = serviceMap[d.name];
      return `<div class="rec-card">
        <div class="rec-title">${rec.service}</div>
        <div class="rec-text">${rec.desc}</div>
      </div>`;
    }).join('')}

    <div class="cta-box">
      <div class="cta-heading">Your results are ready. Now let's build the plan.</div>
      <div class="cta-sub">InspirEDU Design Co. works with organizations to close exactly these kinds of gaps — through strategy, design, and systems that actually stick. Schedule a complimentary strategy session to walk through your results with an expert.</div>
      <a class="cta-btn" href="https://inspiredu-design.com/strategy-session" target="_blank">Schedule Your Strategy Session</a>
      <div class="cta-note">Complimentary · 45 minutes · No obligation</div>
    </div>

    <button class="restart-btn" onclick="restartDiag()">Retake Assessment</button>
  `;
}


function sendLeadEmail() {
  if (state.leadSent) return;
  state.leadSent = true;
  emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
    name: state.userInfo.name,
    organization: state.userInfo.org,
    email: state.userInfo.email,
    date: new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}),
    completed: 'No — lead captured, assessment started',
    overall_score: '—', maturity_level: '—',
    strategic_alignment: '—', audience_experience: '—',
    knowledge_content: '—', workflow_integration: '—', systems_optimization: '—',
    weakest_domains: '—', recommended_services: '—'
  }).catch(()=>{});
}

function sendResultsEmail(domainScores, overall, weakDomains) {
  const maturity = getMaturity(overall);
  emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
    name: state.userInfo.name,
    organization: state.userInfo.org,
    email: state.userInfo.email,
    date: new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}),
    completed: 'Yes — completed all 15 questions',
    overall_score: overall.toFixed(2),
    maturity_level: maturity.label,
    strategic_alignment: domainScores[0].toFixed(2),
    audience_experience: domainScores[1].toFixed(2),
    knowledge_content:   domainScores[2].toFixed(2),
    workflow_integration: domainScores[3].toFixed(2),
    systems_optimization: domainScores[4].toFixed(2),
    weakest_domains: weakDomains.map(d => d.name + ' (' + d.score.toFixed(2) + ')').join(', '),
    recommended_services: weakDomains.map(d => serviceMap[d.name].service).join(', ')
  }).catch(()=>{});
}

function render() {
  document.getElementById('app').innerHTML =
    state.phase === 'intro' ? renderIntro() :
    state.phase === 'questions' ? renderQuestion() :
    renderReport();
}

function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function startDiag() {
  const name = document.getElementById('inp-name').value.trim();
  const org = document.getElementById('inp-org').value.trim();
  const email = document.getElementById('inp-email').value.trim();
  let valid = true;

  const nameErr = document.getElementById('err-name');
  const orgErr = document.getElementById('err-org');
  const emailErr = document.getElementById('err-email');

  if (!name) {
    document.getElementById('inp-name').classList.add('error');
    nameErr.classList.add('visible'); valid = false;
  } else {
    document.getElementById('inp-name').classList.remove('error');
    nameErr.classList.remove('visible');
  }
  if (!org) {
    document.getElementById('inp-org').classList.add('error');
    orgErr.classList.add('visible'); valid = false;
  } else {
    document.getElementById('inp-org').classList.remove('error');
    orgErr.classList.remove('visible');
  }
  if (!email || !validateEmail(email)) {
    document.getElementById('inp-email').classList.add('error');
    emailErr.classList.add('visible'); valid = false;
  } else {
    document.getElementById('inp-email').classList.remove('error');
    emailErr.classList.remove('visible');
  }

  if (!valid) return;
  state.userInfo = { name, org, email };
  sendLeadEmail();
  state.phase = 'questions'; state.qIndex = 0; render();
}

function selectAnswer(val) { state.answers[state.qIndex] = val; render(); }
function goNext() {
  if (!state.answers[state.qIndex]) return;
  state.qIndex < totalQs - 1 ? state.qIndex++ : (state.phase = 'report');
  render();
}
function goBack() { if (state.qIndex > 0) { state.qIndex--; render(); } }
function restartDiag() { state = { phase: 'intro', qIndex: 0, answers: {}, userInfo: { name: '', org: '', email: '' } }; render(); }

render();
</script>
</body>
</html>
